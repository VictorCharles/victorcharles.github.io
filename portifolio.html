<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <!--Colocar metas infos-->
    <meta
      name="description"
      content="Portfólio de Victor Charles — projetos, tecnologias e trabalhos realizados."
    />
    <meta name="theme-color" content="#000000" />
    <title>Portfolio | Victor Charles</title>

    <link
      rel="stylesheet"
      href="https://unicons.iconscout.com/release/v2.1.9/css/unicons.css"
    />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/page.css" />
    <script
      src="https://kit.fontawesome.com/068a0ea6b8.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <body class="page">
    <header class="header" role="banner">
      <a href="index.html" class="header-logo">
        <!--img src="imagina um logo com minhas iniciais" alt="VC"-->
        <span class="header-title">
          <span itemprop="author"
            >Victor<br />
            Charles</span
          >
        </span>
      </a>
      <nav class="header-menu" aria-label="Navegação principal">
        <a href="index.html">Início</a>
        <a href="portifolio.html" aria-current="page">Portfólio</a>
      </nav>
    </header>
    <main class="main">
      <section class="post">
        <header class="page-header portfolio-hero">
          <p class="portfolio-hero__eyebrow" data-portfolio-hero-eyebrow></p>
          <h2 class="page-header__title" data-portfolio-hero-title></h2>
          <h3 class="page-header__subtitle" data-portfolio-hero-subtitle></h3>
          <div class="portfolio-hero__panel" aria-label="Foco técnico atual">
            <div
              class="portfolio-hero__panel-title"
              data-portfolio-focus-title
            ></div>
            <ul class="portfolio-focus-list" data-portfolio-focus-list></ul>
          </div>
        </header>

        <section
          class="portfolio-section"
          aria-labelledby="featured-projects-title"
        >
          <div class="section-heading">
            <span
              class="section-heading__eyebrow"
              data-portfolio-featured-eyebrow
            ></span>
            <h2
              class="section-title section-title--featured"
              id="featured-projects-title"
              data-portfolio-featured-title
            ></h2>
            <p class="section-subtitle" data-portfolio-featured-subtitle></p>
          </div>

          <ul class="project-grid" data-portfolio-featured-list></ul>
        </section>

        <section
          class="portfolio-section portfolio-section--secondary"
          aria-labelledby="older-projects-title"
        >
          <div class="section-heading">
            <span
              class="section-heading__eyebrow"
              data-portfolio-archive-eyebrow
            ></span>
            <h2 class="section-title" id="older-projects-title">
              <span data-portfolio-archive-title></span>
            </h2>
            <p class="section-subtitle" data-portfolio-archive-subtitle></p>
          </div>
          <div data-portfolio-archive-list></div>
        </section>

        <section class="home-section" aria-labelledby="portfolio-contato-title">
          <h2 class="section-title" id="portfolio-contato-title">Contato</h2>
          <p class="section-subtitle">
            Se quiser conversar, estou disponível por aqui:
          </p>
          <ul class="contact-list">
            <li class="email-item">
              <strong>Email:</strong>
              <span
                class="contact-email"
                role="button"
                tabindex="0"
                title="Clique para copiar"
                aria-label="Copiar e-mail"
                data-copy-email
                data-email="vcharles923@gmail.com"
              >
                vcharles923@gmail.com
              </span>
            </li>
            <li>
              <strong>LinkedIn:</strong>
              <a
                target="_blank"
                rel="noopener noreferrer"
                href="https://www.linkedin.com/in/victorcharle/"
                >/in/victorcharle</a
              >
            </li>
            <li>
              <strong>GitHub:</strong>
              <a
                target="_blank"
                rel="noopener noreferrer"
                href="https://github.com/VictorCharles"
                >@VictorCharles</a
              >
            </li>
          </ul>
        </section>
      </section>
    </main>
    <footer class="footer" role="contentinfo">
      <p class="footer-copy">
        <span data-year>2026</span>
        <i class="uil uil-copyright"></i>
        Victor Charles
      </p>
      <nav class="footer-social">
        <!-- <object type="text/html" data="testando.html"/>  -->

          class="github"
          title="Github"

        >
          <img
            alt="GitHub"
            src="https://img.shields.io/badge/github-%23000000.svg?&style=for-the-badge&logo=github&logoColor=white"
          />
        </a>
        <a
          class="linkedin"

          />
        </a> -->
      </nav>
    </footer>

    <div
      id="toast"
      class="toast"
      role="status"
      aria-live="polite"
      aria-atomic="true"
    ></div>
    <script src="js/site.js"></script>
  </body>
</html>
